{% extends "base.html" %}

{% block content %}
<div class="text-center fade-in-up" style="padding: 80px 0;">
    <h1 style="font-size:4rem;background:linear-gradient(135deg,#6C63FF,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        <i class="fas fa-rocket"></i> SprintHub
    </h1>
    <p class="lead text-white-50">Manage Projects Like Never Before</p>
    <div class="mt-4">
        <a href="/dashboard" class="btn btn-primary btn-lg">Go to Dashboard</a>
        <a href="/projects" class="btn btn-outline-light btn-lg ms-2">View Projects</a>
    </div>
    <div class="row mt-5 justify-content-center">
        <div class="col-md-3 col-6"><div class="glass-card"><h2>10K+</h2><p>Teams</p></div></div>
        <div class="col-md-3 col-6"><div class="glass-card"><h2>100K+</h2><p>Projects</p></div></div>
        <div class="col-md-3 col-6"><div class="glass-card"><h2>1M+</h2><p>Tasks</p></div></div>
    </div>
</div>
{% endblock %}
