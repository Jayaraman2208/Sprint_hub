<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SprintHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            color: #ffffff;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(10,10,26,0.95) !important;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .navbar-brand {
            font-weight: 800;
            background: linear-gradient(135deg, #6C63FF, #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(108,99,255,0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #6C63FF, #FF6B6B);
            border: none;
            padding: 10px 30px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(108,99,255,0.4);
            color: white;
        }
        .btn-danger {
            background: #FF6B6B;
            border: none;
            padding: 5px 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .btn-danger:hover {
            transform: scale(1.05);
        }
        .badge {
            padding: 6px 14px;
            border-radius: 50px;
        }
        .main-content {
            margin-top: 80px;
            padding: 20px 0;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-rocket me-2"></i>SprintHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-white" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/boards">Boards</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/teams">Teams</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
